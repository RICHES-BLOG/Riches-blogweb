<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Riches Bosses</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* Premium Deep-Cosmic Fluid Glass Backdrop */
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #060814 0%, #0b1120 50%, #15133c 100%) no-repeat center center fixed;
            background-size: cover;
            color: #f3f4f6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Pure Glassmorphism Layer Mixin */
        .glass-panel {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(18px) saturate(140%);
            -webkit-backdrop-filter: blur(18px) saturate(140%);
            border: 1px solid rgba(255, 255, 255, 0.09);
            border-radius: 20px;
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.45);
        }

        .login-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Glass Login Window */
        .login-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px) saturate(130%);
            -webkit-backdrop-filter: blur(20px) saturate(130%);
            padding: 45px 35px;
            border-radius: 28px;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(255, 215, 120, 0.15);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .login-box h2 {
            color: #FFD778;
            margin-bottom: 35px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-shadow: 0 0 15px rgba(255, 215, 120, 0.2);
        }

        /* Custom Glass Form Controls */
        .glass-input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }
        
        .glass-input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 1.1rem;
        }

        .login-box input, .modal-content input, .modal-content textarea, .modal-content select {
            width: 100%;
            padding: 15px 15px 15px 46px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(0, 0, 0, 0.25);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .modal-content input, .modal-content textarea, .modal-content select {
            padding: 14px 16px;
        }

        .login-box input:focus, .modal-content input:focus, .modal-content textarea:focus, .modal-content select:focus {
            outline: none;
            background: rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 179, 71, 0.5);
            box-shadow: 0 0 15px rgba(255, 179, 71, 0.15);
        }

        /* Metallic Gold Call-To-Action Controls */
        .btn-gold {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #FFB347 0%, #FFCC67 100%);
            border: none;
            border-radius: 14px;
            color: #060814;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 15px;
            box-shadow: 0 5px 15px rgba(255, 179, 71, 0.3);
            transition: all 0.3s ease;
        }

        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 179, 71, 0.45);
            filter: brightness(1.05);
        }

        /* Admin Master Grid Framework */
        .admin-container {
            display: flex;
            min-height: 100vh;
        }

        /* Glass Side Panel Architecture */
        .sidebar {
            width: 280px;
            background: rgba(10, 12, 26, 0.45);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 90;
        }

        .sidebar h2 {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 40px;
            color: #FFD778;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 0.5px;
        }

        .sidebar nav a {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            color: rgba(255, 255, 255, 0.65);
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .sidebar nav a:hover, .sidebar nav a.active {
            background: rgba(255, 179, 71, 0.12);
            color: #FFD778;
            border-left: 4px solid #FFB347;
            padding-left: 14px;
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 35px 40px;
            width: calc(100% - 280px);
        }

        /* Premium Floating Top Header Bar */
        .header {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 18px 30px;
            border-radius: 18px;
            margin-bottom: 35px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.07);
        }

        .header h3 {
            font-weight: 700;
            color: #fff;
        }

        /* Dynamic Analytics Fluid Metric Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 20px;
            text-align: left;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            background: rgba(255, 179, 71, 0.08);
            border-color: rgba(255, 179, 71, 0.25);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
        }

        .stat-card-info h3 {
            font-size: 2.2rem;
            font-weight: 800;
            color: #fff;
            line-height: 1.2;
        }

        .stat-card-info p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        .stat-card i {
            font-size: 2.2rem;
            color: #FFB347;
            background: rgba(255, 179, 71, 0.1);
            padding: 14px;
            border-radius: 14px;
        }

        /* Tabular Layout Configurations */
        .data-table {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            overflow: hidden;
            margin-bottom: 30px;
        }

        .table-responsive-wrapper {
            overflow-x: auto;
            width: 100%;
        }

        .data-table table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
        }

        .data-table th {
            background: rgba(0, 0, 0, 0.3);
            color: #FFD778;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            padding: 18px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .data-table td {
            padding: 16px 24px;
            color: rgba(255, 255, 255, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.95rem;
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        .data-table tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        /* Refined Action Control Utilities */
        .btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            color: #fff;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        .btn-danger {
            background: rgba(220, 53, 69, 0.2);
            border-color: rgba(220, 53, 69, 0.4);
            color: #ff6b7a;
        }

        .btn-danger:hover {
            background: rgba(220, 53, 69, 0.4);
            color: #fff;
        }

        .btn-primary {
            background: rgba(255, 179, 71, 0.15);
            border-color: rgba(255, 179, 71, 0.3);
            color: #FFD778;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #FFB347 0%, #FFCC67 100%);
            color: #060814;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 0.85rem;
            border-radius: 8px;
        }

        /* Glass Modal View Overlays */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(4, 6, 14, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: rgba(20, 24, 46, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 35px;
            border-radius: 24px;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
        }

        .modal-content h3 {
            color: #FFD778;
            margin-bottom: 25px;
            font-weight: 700;
        }

        .modal-content label {
            display: block;
            margin: 15px 0 5px 0;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Micro-Animations & Dynamic Feedback Elements */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }

        .notification {
            position: fixed;
            top: 25px;
            right: 25px;
            padding: 16px 26px;
            border-radius: 14px;
            color: white;
            z-index: 2000;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        @keyframes slideIn {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading { text-align: center; padding: 50px; color: rgba(255, 255, 255, 0.4); }
        .spinner { animation: spin 1s linear infinite; font-size: 2.2rem; color: #FFB347; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .menu-toggle { display: none; }

        @media (max-width: 992px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; width: 100%; padding: 20px; }
            .menu-toggle { display: inline-flex; }
        }
    </style>
</head>
<body>

    <div id="app"></div>

    <script>
        // ==================== SUPABASE CONFIGURATION ====================
        const SUPABASE_URL = 'https://kshqtnqtyeqczswxtgdj.supabase.co';  
        const SUPABASE_ANON_KEY = 'sb_publishable_BiZTbcIXG58BMRoQskCqmg_9zfrVrIs';  
        
        let supabase = null;
        let currentUser = null;
        let currentTable = null;
        let editingItem = null;
        
        function initSupabase() {
            try {
                // Instantiating via window layer safely
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            } catch (err) {
                console.error("Initialization layer error:", err);
            }
        }
        
        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = 'notification';
            if (type === 'success') notification.style.background = 'rgba(76, 175, 80, 0.9)';
            else if (type === 'error') notification.style.background = 'rgba(220, 53, 69, 0.9)';
            else notification.style.background = 'rgba(255, 179, 71, 0.9)';
            
            notification.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }
        
        // ==================== LOGIN PAGE ====================
        function showLoginPage() {
            document.getElementById('app').innerHTML = `
                <div class="login-container">
                    <div class="login-box">
                        <h2><i class="fas fa-crown" style="color:#FFD778;"></i> Admin Portal</h2>
                        <div class="glass-input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="loginEmail" placeholder="Admin Email" autocomplete="email">
                        </div>
                        <div class="glass-input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="loginPassword" placeholder="Secret Token Key" autocomplete="current-password">
                        </div>
                        <button class="btn-gold" onclick="handleLogin()"><i class="fas fa-sign-in-alt"></i> Authenticate System</button>
                    </div>
                </div>
            `;
        }
        
        async function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            
            if (!email || !password) {
                showNotification('Credentials entry missing', 'error');
                return;
            }
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                currentUser = data.user;
                showNotification('Authentication Granted', 'success');
                loadAdminDashboard();
            } catch (error) {
                showNotification(error.message, 'error');
            }
        }
        
        // ==================== ADMIN DASHBOARD ====================
        function loadAdminDashboard() {
            document.getElementById('app').innerHTML = `
                <div class="admin-container">
                    <div class="sidebar" id="sidebar">
                        <h2><i class="fas fa-crown"></i> RICHES BOSSES</h2>
                        <nav>
                            <a href="#" data-tab="dashboard" class="active"><i class="fas fa-chart-line"></i> Analytics Overview</a>
                            <a href="#" data-tab="music"><i class="fas fa-music"></i> Audio Records</a>
                            <a href="#" data-tab="movies"><i class="fas fa-film"></i> Cinema Streams</a>
                            <a href="#" data-tab="blog"><i class="fas fa-blog"></i> Narrative Feed</a>
                            <a href="#" data-tab="contacts"><i class="fas fa-envelope"></i> Core Inbox</a>
                            <a href="#" data-tab="subscribers"><i class="fas fa-users"></i> General Audience</a>
                            <a href="#" data-tab="import"><i class="fas fa-upload"></i> Engine Sync</a>
                        </nav>
                    </div>
                    <div class="main-content">
                        <div class="header">
                            <button class="btn menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                            <h3 id="pageTitle">Analytics Overview</h3>
                            <div>
                                <span style="font-size:0.9rem; margin-right:15px; color:rgba(255,255,255,0.6);"><i class="fa fa-user-shield"></i> ${currentUser?.email}</span>
                                <button class="btn btn-sm" onclick="handleLogout()" style="border-color:rgba(255,255,255,0.2);"><i class="fas fa-sign-out-alt"></i> Leave</button>
                            </div>
                        </div>
                        
                        <div id="dashboard" class="tab-content active">
                            <div class="stats-grid" id="statsGrid">
                                <div class="loading"><i class="fas fa-spinner spinner"></i> Collecting analytics metrics...</div>
                            </div>
                            <div class="data-table">
                                <h4 style="padding: 20px; font-weight:700;"><i class="fa fa-history text-warning"></i> Recent Transmission Feed</h4>
                                <div class="table-responsive-wrapper" id="recentContacts"></div>
                            </div>
                        </div>
                        
                        <div id="music" class="tab-content">
                            <div style="margin-bottom: 25px;">
                                <button class="btn btn-primary" onclick="openAddModal('music')"><i class="fas fa-plus-circle"></i> catalog new release</button>
                            </div>
                            <div class="data-table">
                                <div class="table-responsive-wrapper">
                                    <table>
                                        <thead><tr><th>Track Identification</th><th>Song Title</th><th>Lead Artist</th><th>Sonic Genre</th><th>Streams</th><th>Operations</th></tr></thead>
                                        <tbody id="musicTableBody"><tr><td colspan="6" class="loading"><i class="fas fa-spinner spinner"></i> Indexing data tracks...</td></tr></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                        
                        <div id="movies" class="tab-content">
                            <div style="margin-bottom: 25px;">
                                <button class="btn btn-primary" onclick="openAddModal('movies')"><i class="fas fa-plus-circle"></i> register digital film</button>
                            </div>
                            <div class="data-table">
                                <div class="table-responsive-wrapper">
                                    <table>
                                        <thead><tr><th>Catalog ID</th><th>Cinematic Title</th><th>Media Category</th><th>Release Phase</th><th>Operations</th></tr></thead>
                                        <tbody id="moviesTableBody"><tr><td colspan="5" class="loading"><i class="fas fa-spinner spinner"></i> Tracking storage volumes...</td></tr></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                        
                        <div id="blog" class="tab-content">
                            <div style="margin-bottom: 25px;">
                                <button class="btn btn-primary" onclick="openAddModal('blog_posts')"><i class="fas fa-plus-circle"></i> compose new post</button>
                            </div>
                            <div class="data-table">
                                <div class="table-responsive-wrapper">
                                    <table>
                                        <thead><tr><th>Post ID</th><th>Document Title</th><th>Category Link</th><th>Status</th><th>Operations</th></tr></thead>
                                        <tbody id="blogTableBody"><tr><td colspan="5" class="loading"><i class="fas fa-spinner spinner"></i> Querying article data...</td></tr></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                        
                        <div id="contacts" class="tab-content">
                            <div class="data-table">
                                <div class="table-responsive-wrapper">
                                    <table>
                                        <thead><tr><th>ID</th><th>Client Label</th><th>Communications Link</th><th>Message Blueprint</th><th>State</th><th>Operations</th></tr></thead>
                                        <tbody id="contactsTableBody"><tr><td colspan="6" class="loading"><i class="fas fa-spinner spinner"></i> Sifting entry fields...</td></tr></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                        
                        <div id="subscribers" class="tab-content">
                            <div class="data-table">
                                <div class="table-responsive-wrapper">
                                    <table>
                                        <thead><tr><th>Subscriber Token</th><th>Email Coordinates</th><th>Registry Stamp</th><th>Operations</th></tr></thead>
                                        <tbody id="subscribersTableBody"><tr><td colspan="4" class="loading"><i class="fas fa-spinner spinner"></i> Indexing registry metrics...</td></tr></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                        
                        <div id="import" class="tab-content">
                            <div class="stats-grid">
                                <div class="stat-card" style="flex-direction:column; align-items:flex-start; gap:15px;">
                                    <div>
                                        <i class="fas fa-file-code"></i>
                                        <h3 style="font-size:1.4rem; margin-top:10px;">Import Structural Schema</h3>
                                        <p style="color:rgba(255,255,255,0.5); font-size:0.85rem; margin-top:4px;">Inject backup elements via JSON format packages.</p>
                                    </div>
                                    <input type="file" id="jsonFile" accept=".json">
                                    <select id="importType">
                                        <option value="music">Audio Archive (music)</option>
                                        <option value="movies">Cinema Records (movies)</option>
                                        <option value="blog_posts">Narrative Elements (blog_posts)</option>
                                    </select>
                                    <button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="importJSON()">Execute Injection Script</button>
                                </div>
                                
                                <div class="stat-card" style="flex-direction:column; align-items:flex-start; justify-content:space-between;">
                                    <div>
                                        <i class="fas fa-database"></i>
                                        <h3 style="font-size:1.4rem; margin-top:10px;">Load Blueprint Nodes</h3>
                                        <p style="color:rgba(255,255,255,0.5); font-size:0.85rem; margin-top:4px;">Populate network nodes with standard mock templates.</p>
                                    </div>
                                    <button class="btn btn-gold" style="margin-top:auto;" onclick="loadSampleData()">Deploy Production Seeds</button>
                                </div>
                            </div>
                            <div id="importStatus"></div>
                        </div>
                    </div>
                </div>
                
                <div id="itemModal" class="modal">
                    <div class="modal-content">
                        <h3 id="modalTitle">Structural Mutation Setup</h3>
                        <div id="modalForm"></div>
                        <div style="margin-top: 25px; display:flex; gap:12px; justify-content:flex-end;">
                            <button class="btn" onclick="closeModal()">Abort Link</button>
                            <button class="btn btn-primary" onclick="saveItem()">Commit Structure</button>
                        </div>
                    </div>
                </div>
            `;
            
            // Add event listeners for tabs dynamically
            document.querySelectorAll('[data-tab]').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const tab = link.dataset.tab;
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    const targetContent = document.getElementById(tab);
                    if(targetContent) targetContent.classList.add('active');
                    
                    document.querySelectorAll('[data-tab]').forEach(l => l.classList.remove('active'));
                    link.classList.add('active');
                    document.getElementById('pageTitle').innerText = link.innerText.trim();
                    if(window.innerWidth <= 992) toggleSidebar();
                });
            });
            
            // Protected Initial Load Strategy
            refreshAllDataViews();
        }
        
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }
        
        async function handleLogout() {
            await supabase.auth.signOut();
            showNotification('Session destroyed securely', 'success');
            showLoginPage();
        }

        function refreshAllDataViews() {
            loadDashboardStats().catch(e => console.error(e));

        async function saveItem() {
            const formData = {};
            const inputs = document.querySelectorAll('#modalForm input, #modalForm textarea, #modalForm select');
            
            let verificationCheckPassed = true;
            inputs.forEach(input => {
                if (input.hasAttribute('required') && !input.value.trim()) {
                    verificationCheckPassed = false;
                }
                if (input.type === 'checkbox') {
                    formData[input.id] = input.checked;
                } else {
                    formData[input.id] = input.value.trim() ? input.value.trim() : null;
                }
            });
            
            if(!verificationCheckPassed) {
                showNotification('Please fill in all mandatory data fields', 'error');
                return;
            }

            if(currentTable === 'blog_posts' && !formData['slug'] && formData['title']) {
                formData['slug'] = formData['title'].toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
            }
            
            try {
                if (editingItem) {
                    const { error } = await supabase.from(currentTable).update(formData).eq('id', editingItem);
                    if(error) throw error;
                    showNotification('System Node Mutated Successfully', 'success');
                } else {
                    const { error } = await supabase.from(currentTable).insert([formData]);
                    if(error) throw error;
                    showNotification('Structural Element Injected Cleanly', 'success');
                }
                closeModal();
                
                if (currentTable === 'music') loadMusic();
                else if (currentTable === 'movies') loadMovies();
                else if (currentTable === 'blog_posts') loadBlog();
                loadDashboardStats();
            } catch (error) {
                showNotification('Write sequence error: ' + error.message, 'error');
            }
        }

            if (confirm('Execute permanent drop script on this structural entity row?')) {
                try {
                    const { error } = await supabase.from(table).delete().eq('id', id);
                    if(error) throw error;
                    showNotification('Entity purged from system tables', 'success');
                    if (table === 'music') loadMusic();
                    else if (table === 'movies') loadMovies();
                    else if (table === 'blog_posts') loadBlog();
                    else if (table === 'contacts') loadContacts();
                    else if (table === 'subscribers') loadSubscribers();
                    loadDashboardStats();
                } catch(error) {
                    showNotification('Drop command error: ' + error.message, 'error');
                }
            }
        }

        // ==================== INJECTION & SAMPLE SEED RECOVERY ENGINE ====================
        async function importJSON() {
            const fileInput = document.getElementById('jsonFile');
            const importType = document.getElementById('importType').value;
            
            if (!fileInput.files[0]) {
                showNotification('Target file parsing payload target void', 'error');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    const items = Array.isArray(data) ? data : [data];
                    
                    let importedSuccessfulCount = 0;
                    for (const item of items) {
                        // Stripping primary system auto-incrementing identity keys safely if needed
                        if(item.id) delete item.id;
                        const { error } = await supabase.from(importType).insert([item]);
                        if(!error) importedSuccessfulCount++;
                    }
                    
                    showNotification(`Sync phase execution completed [${importedSuccessfulCount}/${items.length} Elements Linked]`, 'success');
                    
                    if (importType === 'music') loadMusic();
                    else if (importType === 'movies') loadMovies();
                    else loadBlog();
                    loadDashboardStats();
                } catch (error) {
                    showNotification('Cryptographic verification failure: ' + error.message, 'error');
                }
            };
            reader.readAsText(fileInput.files[0]);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.toString().replace(/[&<>]/g, m => {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
